site_name: Ty Anderson Security
site_url: https://tyanderson.red/
site_description: Security researcher, red teamer, and author
site_author: Ty Anderson

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: slate
      primary: red
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: red
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    logo: material/shield-lock

plugins:
  - search
  - blog:
      blog_dir: blog
      post_date_format: long
      archive: true
      categories: true

nav:
  - Home: index.md
  - Blog: blog/index.md
  - Hack Back Game: hackback/index.md
  - Red Team Strategy Guide:
      - Overview: redteamstrategyguide/index.md
      - "Chapter 1: Introduction": redteamstrategyguide/chapter-1.md
      - "Chapter 2: Core Concepts": redteamstrategyguide/chapter-2.md
      - "Chapter 3: Advanced Topics": redteamstrategyguide/chapter-3.md

extra:
  book_title: Red Team Strategy Guide
  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/ty-anderson-redteamer/
    - icon: fontawesome/brands/github
      link: https://github.com/minispooner
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/TyAnderson333

watch:
  - overrides

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
