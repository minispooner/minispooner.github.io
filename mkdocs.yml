site_name: Ty Anderson Security
site_url: https://tyanderson.red/
site_description: Security researcher, red teamer, and author
site_author: Ty Anderson

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: slate
      primary: red
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: red
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    logo: material/shield-lock

plugins:
  - search
  - blog:
      blog_dir: blog
      post_date_format: long
      archive: true
      categories: true

nav:
  - Home: index.md
  - Blog: blog/index.md
  - Hack Back Game: hackback/index.md
  - Red Team Strategy Guide:
      - Overview: redteamstrategyguide/index.md
      - "1: Introduction": redteamstrategyguide/1-introduction.md
      - "2: The Purpose of Internal Red Teams": redteamstrategyguide/2-purpose.md
      - "3: Marketing & Promoting Red Team Services": redteamstrategyguide/3-marketing.md
      - "4: Scoping & Planning Operations": redteamstrategyguide/4-scoping.md
      - "5: Operating Intentionally": redteamstrategyguide/5-operating.md
      - "6: Reporting & Influencing Change": redteamstrategyguide/6-reporting.md
      - "7: Measuring Success": redteamstrategyguide/7-measuring.md
      - "8: Outro": redteamstrategyguide/8-outro.md

extra:
  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/ty-anderson-redteamer/
    - icon: fontawesome/brands/github
      link: https://github.com/minispooner
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/TyAnderson333

watch:
  - overrides

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
